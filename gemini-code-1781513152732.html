<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Trắc Nghiệm D CLASS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 800px;
            background-color: white;
            padding: 20px 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #d32f2f;
            position: relative;
            overflow: hidden;
        }
        /* Dấu mộc chìm chống ăn cắp */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 60px;
            color: rgba(211, 47, 47, 0.08); /* Rất mờ để không cản trở bài làm */
            white-space: nowrap;
            pointer-events: none;
            font-weight: 900;
            z-index: 0;
            text-align: center;
            line-height: 1.2;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1; /* Nổi lên trên watermark */
        }

        h2, h3 {
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        h3 {
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .header-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            border: 2px solid #d32f2f;
            padding: 15px;
            border-radius: 5px;
        }
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .info-group label {
            display: flex;
            align-items: flex-end;
            font-weight: bold;
        }
        .info-group input {
            border: none;
            border-bottom: 1px dotted #d32f2f;
            outline: none;
            color: black;
            font-size: 16px;
            flex-grow: 1;
            margin-left: 10px;
            background: transparent;
        }
        .section-title {
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid #d32f2f;
            display: inline-block;
            font-size: 18px;
        }
        
        /* CSS cho các ô tô tròn */
        .bubble-group {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 8px;
            color: black;
        }
        .bubble-group span.q-num {
            width: 25px;
            text-align: right;
            font-weight: bold;
            color: #d32f2f;
        }
        .bubble {
            cursor: pointer;
        }
        .bubble input { display: none; }
        .bubble span.circle {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 1px solid #d32f2f;
            border-radius: 50%;
            text-align: center;
            line-height: 22px;
            font-size: 13px;
            color: #d32f2f;
            background-color: white;
            transition: all 0.2s;
        }
        .bubble input:checked + span.circle {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        /* Bố cục Phần I */
        .part1-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        /* Bố cục Phần II */
        .part2-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .p2-box { border: 1px solid #d32f2f; padding: 8px; background: rgba(255,255,255,0.8); }
        .p2-box-title { text-align: center; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #d32f2f; padding-bottom: 5px;}
        .p2-header { display: flex; justify-content: flex-end; gap: 10px; font-size: 12px; margin-bottom: 8px; color: #d32f2f; font-weight: bold;}
        .p2-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; color: black; font-size: 15px;}
        
        /* Bố cục Phần III (Đã fix lỗi chèn số 6) */
        .part3-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .p3-box { border: 1px solid #d32f2f; padding: 10px 5px; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.8);}
        .p3-inputs { display: flex; gap: 4px; margin-bottom: 8px;}
        .p3-inputs input { 
            width: 26px; /* Đã làm rộng ra */
            height: 28px;
            text-align: center; 
            border: 1px solid #d32f2f; 
            color: black;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box; /* Đảm bảo không bị tràn */
            border-radius: 3px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #d32f2f;
            color: white;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 8px;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-submit:hover { background-color: #b71c1c; }
    </style>
</head>
<body>

<div class="container">
    <div class="watermark">HỆ THỐNG D CLASS<br>BẢN QUYỀN GIA SƯ DIHOBI</div>
    
    <form action="https://formsubmit.co/toiyeuvatlythptqg26@gmail.com" method="POST" class="content-wrapper">
        
        <input type="hidden" name="_subject" value="[D CLASS] Có học sinh vừa nộp bài trắc nghiệm!">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table"> <h2>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h2>
        <h3>HỆ THỐNG ĐÁNH GIÁ NĂNG LỰC D CLASS</h3>
        
        <div class="header-info">
            <div class="info-group">
                <label>Họ và tên học sinh: <input type="text" name="Ho_Ten" required></label>
                <label>Bài thi / Môn thi: <input type="text" name="Mon_Thi" required></label>
            </div>
            <div class="info-group">
                <label>Số báo danh: <input type="text" name="SBD" required></label>
                <label>Mã đề thi: <input type="text" name="Ma_De" required></label>
            </div>
        </div>

        <div class="section-title">PHẦN I: Câu hỏi trắc nghiệm nhiều phương án lựa chọn</div>
        <div class="part1-grid" id="part1-container"></div>

        <div class="section-title">PHẦN II: Câu hỏi trắc nghiệm đúng sai</div>
        <div class="part2-grid" id="part2-container"></div>

        <div class="section-title">PHẦN III: Câu hỏi trắc nghiệm trả lời ngắn</div>
        <div class="part3-grid" id="part3-container"></div>

        <button type="submit" class="btn-submit">NỘP BÀI VÀO HỆ THỐNG D CLASS</button>
    </form>
</div>

<script>
    // 1. Render Phần I (40 câu)
    const p1Container = document.getElementById('part1-container');
    const options = ['A', 'B', 'C', 'D'];
    for (let i = 1; i <= 40; i++) {
        let html = `<div class="bubble-group"><span class="q-num">${i}</span>`;
        options.forEach(opt => {
            // Tên biến rõ ràng để khi nhận email dễ đọc: P1_Cau_1 = A
            html += `<label class="bubble"><input type="checkbox" name="P1_Cau_${i}" value="${opt}"><span class="circle">${opt}</span></label>`;
        });
        html += `</div>`;
        p1Container.innerHTML += html;
    }

    // 2. Render Phần II (8 câu Đúng/Sai)
    const p2Container = document.getElementById('part2-container');
    const subOpts = ['a', 'b', 'c', 'd'];
    for (let i = 1; i <= 8; i++) {
        let boxHtml = `<div class="p2-box">
            <div class="p2-box-title">Câu ${i}</div>
            <div class="p2-header"><span>Đ</span> <span>S</span></div>`;
        subOpts.forEach(sub => {
            boxHtml += `<div class="p2-row">
                <span>${sub})</span>
                <div>
                    <label class="bubble"><input type="checkbox" name="P2_Cau_${i}_Y_${sub}" value="Đúng"><span class="circle">Đ</span></label>
                    <label class="bubble"><input type="checkbox" name="P2_Cau_${i}_Y_${sub}" value="Sai"><span class="circle">S</span></label>
                </div>
            </div>`;
        });
        boxHtml += `</div>`;
        p2Container.innerHTML += boxHtml;
    }

    // 3. Render Phần III (6 câu điền số)
    const p3Container = document.getElementById('part3-container');
    for (let i = 1; i <= 6; i++) {
        let boxHtml = `<div class="p3-box">
            <div class="p2-box-title" style="width:100%; border:none;">Câu ${i}</div>
            <div class="p3-inputs">
                <input type="text" maxlength="1" name="P3_Cau_${i}[]" placeholder="-" title="Dấu âm (nếu có)">
                <input type="text" maxlength="1" name="P3_Cau_${i}[]">
                <input type="text" maxlength="1" name="P3_Cau_${i}[]">
                <input type="text" maxlength="1" name="P3_Cau_${i}[]">
                <input type="text" maxlength="1" name="P3_Cau_${i}[]">
            </div>
            <small style="font-size:11px; color:black; font-weight:bold;">Điền đáp án</small>
        </div>`;
        p3Container.innerHTML += boxHtml;
    }
</script>

</body>
</html>
