<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Trả Lời Trắc Nghiệm 2025</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 800px;
            background-color: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #d32f2f;
        }
        h2 {
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .header-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            border: 1px solid #d32f2f;
            padding: 10px;
        }
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .info-group input {
            border: none;
            border-bottom: 1px dotted #d32f2f;
            outline: none;
            color: black;
            font-size: 14px;
        }
        .section-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 2px solid #d32f2f;
            display: inline-block;
        }
        
        /* CSS cho các ô tô tròn (Bubbles) */
        .bubble-group {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
            color: black;
        }
        .bubble-group span.q-num {
            width: 25px;
            text-align: right;
            font-weight: bold;
            color: #d32f2f;
        }
        .bubble {
            cursor: pointer;
        }
        .bubble input {
            display: none; /* Ẩn checkbox mặc định */
        }
        .bubble span.circle {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #d32f2f;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
            color: #d32f2f;
            background-color: white;
        }
        /* Khi checkbox được check, đổi màu nền */
        .bubble input:checked + span.circle {
            background-color: #d32f2f;
            color: white;
            font-weight: bold;
        }

        /* Bố cục Phần I */
        .part1-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Bố cục Phần II */
        .part2-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .p2-box {
            border: 1px solid #d32f2f;
            padding: 5px;
        }
        .p2-box-title { text-align: center; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #d32f2f;}
        .p2-header { display: flex; justify-content: flex-end; gap: 10px; font-size: 12px; margin-bottom: 5px; color: #d32f2f;}
        .p2-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; color: black; font-size: 14px;}
        
        /* Bố cục Phần III */
        .part3-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }
        .p3-box { border: 1px solid #d32f2f; padding: 5px; display: flex; flex-direction: column; align-items: center;}
        .p3-inputs { display: flex; gap: 2px; margin-bottom: 5px;}
        .p3-inputs input { width: 20px; text-align: center; border: 1px solid #d32f2f; color: black;}

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #d32f2f;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            border-radius: 5px;
        }
        .btn-submit:hover {
            background-color: #b71c1c;
        }
        
        /* Ẩn nút submit khi in PDF */
        .html2pdf__container .btn-submit { display: none; }
    </style>
</head>
<body>

<div class="container" id="exam-form">
    <h2>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h2>
    
    <div class="header-info">
        <div class="info-group">
            <label>Kỳ thi: <input type="text" style="width: 80%;"></label>
            <label>Bài thi: <input type="text" style="width: 80%;"></label>
            <label>Ngày thi: <input type="text" style="width: 75%;" placeholder=".../.../20..."></label>
            <label>Hội đồng thi: <input type="text" style="width: 70%;"></label>
            <label>Họ và tên thí sinh: <input type="text" style="width: 60%;"></label>
        </div>
        <div class="info-group">
            <label>Phòng thi số: <input type="text" style="width: 70%;"></label>
            <label>Số báo danh: <input type="text" style="width: 70%;"></label>
            <label>Mã đề thi: <input type="text" style="width: 75%;"></label>
            <label>Ngày sinh: <input type="text" style="width: 75%;"></label>
        </div>
    </div>

    <div class="section-title">PHẦN I</div>
    <div class="part1-grid" id="part1-container"></div>

    <div class="section-title">PHẦN II</div>
    <div class="part2-grid" id="part2-container"></div>

    <div class="section-title">PHẦN III</div>
    <div class="part3-grid" id="part3-container"></div>

    <button class="btn-submit" onclick="submitAndGeneratePDF()">GỬI BÀI & TẢI FILE PDF</button>
</div>

<script>
    // 1. Render Phần I (40 câu) - Dùng checkbox để chọn không giới hạn
    const p1Container = document.getElementById('part1-container');
    const options = ['A', 'B', 'C', 'D'];
    for (let i = 1; i <= 40; i++) {
        let html = `<div class="bubble-group"><span class="q-num">${i}</span>`;
        options.forEach(opt => {
            // Thay type="radio" bằng type="checkbox"
            html += `<label class="bubble"><input type="checkbox" name="p1_q${i}_${opt}" value="${opt}"><span class="circle">${opt}</span></label>`;
        });
        html += `</div>`;
        p1Container.innerHTML += html;
    }

    // 2. Render Phần II (8 câu Đúng/Sai) - Dùng checkbox để chọn không giới hạn
    const p2Container = document.getElementById('part2-container');
    const subOpts = ['a', 'b', 'c', 'd'];
    for (let i = 1; i <= 8; i++) {
        let boxHtml = `<div class="p2-box">
            <div class="p2-box-title">Câu ${i}</div>
            <div class="p2-header"><span>Đúng</span> <span>Sai</span></div>`;
        subOpts.forEach(sub => {
            boxHtml += `<div class="p2-row">
                <span>${sub})</span>
                <div>
                    <label class="bubble"><input type="checkbox" name="p2_q${i}_${sub}_D" value="D"><span class="circle">Đ</span></label>
                    <label class="bubble"><input type="checkbox" name="p2_q${i}_${sub}_S" value="S"><span class="circle">S</span></label>
                </div>
            </div>`;
        });
        boxHtml += `</div>`;
        p2Container.innerHTML += boxHtml;
    }

    // 3. Render Phần III (6 câu điền số)
    const p3Container = document.getElementById('part3-container');
    for (let i = 1; i <= 6; i++) {
        let boxHtml = `<div class="p3-box">
            <div class="p2-box-title" style="width:100%; border:none;">Câu ${i}</div>
            <div class="p3-inputs">
                <input type="text" maxlength="1" placeholder="-" title="Dấu âm (nếu có)">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
            </div>
            <small style="font-size:10px; color:black;">Điền đáp án</small>
        </div>`;
        p3Container.innerHTML += boxHtml;
    }

    // 4. Hàm xử lý xuất PDF
    function submitAndGeneratePDF() {
        const element = document.getElementById('exam-form');
        const opt = {
            margin:       0.2,
            filename:     'Phieu_Trac_Nghiem_Bai_Lam.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        alert("Hệ thống đang tạo file PDF. Vui lòng tải file này về và đính kèm gửi vào email: toiyeuvatlythptqg26@gmail.com");
        
        // Tạo file PDF
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
